<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanSetu | Rental Calendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="equipment_dashboard_style.css">
    <link rel="stylesheet" href="../shared/common.css">
</head>
<body>
    <div class="app-container">
        <header class="dashboard-header" style="background: linear-gradient(135deg, #1565c0, #1e88e5); color: white; padding: 25px 20px;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <a href="equipment_dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
                <div>
                    <h1 style="font-size: 1.5rem;">Rental Calendar</h1>
                    <p style="font-size: 0.85rem; opacity: 0.9;">Schedule & Track Bookings</p>
                </div>
            </div>
        </header>

        <div id="calendar-container" class="calendar-container" style="padding: 20px;">
            <div id="calendar-view" style="display: none;">
                <h2 class="section-title">Schedule</h2>
                <div id="calendar-list" class="calendar-list">
                    <!-- Calendar entries injected here -->
                </div>
            </div>

            <div id="empty-state" style="text-align: center; padding: 50px 20px;">
                <i class="fa-solid fa-calendar-days" style="font-size: 4rem; color: #1565c0; opacity: 0.2; margin-bottom: 20px;"></i>
                <h3>No Approved Rentals</h3>
                <p style="color: #666;">Once you approve booking requests, they will appear in your schedule.</p>
            </div>
        </div>

        <style>
            .calendar-list { display: flex; flex-direction: column; gap: 15px; }
            .event-card { 
                background: white; border-radius: 12px; padding: 15px; 
                border-left: 5px solid #1e88e5; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
                display: flex; justify-content: space-between; align-items: center;
            }
            .event-info h4 { margin: 0; font-size: 1rem; color: #37474f; }
            .event-info p { margin: 2px 0 0 0; font-size: 0.8rem; color: #666; }
            .event-date { text-align: right; font-size: 0.85rem; font-weight: 600; color: #1565c0; }
        </style>

        <script type="module" src="rental_calendar.js"></script>

    </div>
</body>
</html>
