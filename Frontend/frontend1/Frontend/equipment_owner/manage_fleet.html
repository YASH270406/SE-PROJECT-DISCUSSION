<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanSetu | Manage Fleet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="equipment_dashboard_style.css">
    <link rel="stylesheet" href="../shared/common.css">
    <style>
        .fleet-container { padding: 20px; }
        .empty-state { text-align: center; margin-top: 50px; color: #666; }
        .empty-state i { font-size: 5rem; color: var(--primary-green); opacity: 0.2; margin-bottom: 20px; }
        
        .fleet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .equipment-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .status-available { background: #e8f5e9; color: #2e7d32; }
        .status-booked { background: #fff3e0; color: #e65100; }

        /* Modal Styling */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal.open { display: flex; }
        .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 20px; padding: 30px; position: relative; animation: slideUp 0.3s ease-out; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.85rem; font-weight: 600; color: #555; }
        .form-group input, .form-group select { padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }
        
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    </style>
</head>
<body>
    <div class="app-container">
        
        <header class="dashboard-header" style="background: linear-gradient(135deg, #2e7d32, #43a047); color: white; padding: 25px 20px;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <a href="equipment_dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
                <div>
                    <h1 style="font-size: 1.5rem;">Manage Fleet</h1>
                    <p style="font-size: 0.85rem; opacity: 0.9;">Register & Monitor your farm assets</p>
                </div>
            </div>
        </header>

        <div class="fleet-container">
            <div id="fleet-view" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2 class="section-title">Your Assets</h2>
                    <button class="primary-btn" onclick="window.toggleModal(true)" style="padding: 10px 20px;">+ Add New</button>
                </div>
                <div id="fleet-grid" class="fleet-grid">
                    <!-- Cards injected via JS -->
                </div>
            </div>

            <div id="empty-state" class="empty-state">
                <i class="fa-solid fa-tractor"></i>
                <h3>No Assets Registered</h3>
                <p>Start listing your tractors, harvesters, or tools to earn rental income.</p>
                <button class="primary-btn" style="margin-top: 30px; padding: 12px 30px;" onclick="window.toggleModal(true)">
                    + Add New Equipment
                </button>
            </div>
        </div>

    </div>

    <!-- Add Equipment Modal (FR-4.1) -->
    <div id="equip-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="color: var(--primary-green);"><i class="fa-solid fa-plus-circle"></i> Add Equipment</h3>
                <button class="close-btn" onclick="window.toggleModal(false)" style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:#999;">&times;</button>
            </div>
            <form id="equip-form">
                <div class="form-group">
                    <label>Equipment Name</label>
                    <input type="text" id="eq-name" placeholder="e.g., Mahindra Arjun Nova" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Category</label>
                        <select id="eq-type" required>
                            <option value="Tractor">Tractor</option>
                            <option value="Harvester">Harvester</option>
                            <option value="Plough">Plough</option>
                            <option value="Seed Drill">Seed Drill</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>HP Specification</label>
                        <input type="number" id="eq-hp" placeholder="e.g., 50" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Model Year</label>
                        <input type="number" id="eq-model" placeholder="2022" required>
                    </div>
                    <div class="form-group">
                        <label>Hourly Rate (₹)</label>
                        <input type="number" id="eq-rate" placeholder="500" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Base Location</label>
                    <input type="text" id="eq-location" placeholder="Sub-district, State" required>
                </div>
                <button type="submit" class="primary-btn" style="width: 100%; margin-top: 10px; padding: 15px;">Register Machine <i class="fa-solid fa-paper-plane"></i></button>
            </form>
        </div>
    </div>

    <script type="module" src="manage_fleet.js"></script>
</body>
</html>
