<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanSetu | Payment Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/common.css">

    <style>
        /* Reusing global variables */
        :root {
            --primary-green: #2e7d32;
            --charcoal: #37474f;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: var(--charcoal);
        }

        .header {
            background: var(--primary-green);
            color: var(--white);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }



        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .payment-card {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid #ccc;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .status-processing {
            border-left-color: #fbc02d;
        }

        .status-settled {
            border-left-color: var(--primary-green);
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .amount {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-green);
        }

        .escrow-badge {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            background: #eee;
            font-weight: 600;
        }

        .btn-download {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background: #e8f5e9;
            color: var(--primary-green);
            border: 1px solid #c8e6c9;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header class="header">
        <a href="farmer_dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <h2>Escrow & Payments</h2>
    </header>


    <div class="container" id="payments-container">
    </div>
    <script src="../shared/toast.js"></script>
    <script src="payment_status.js"></script>
</body>

</html>
