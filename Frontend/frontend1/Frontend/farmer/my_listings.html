<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanSetu | My Listings</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/common.css">

    <style>
        :root {
            --primary-green: #2e7d32;
            --soil-brown: #8d6e63;
            --harvest-yellow: #fbc02d;
            --charcoal: #37474f;
            --white: #ffffff;
            --danger-red: #d32f2f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: var(--charcoal);
            padding-bottom: 40px;
        }

        .header {
            background: var(--primary-green);
            color: var(--white);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }



        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .listing-card {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .crop-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--charcoal);
        }

        .crop-qty {
            font-size: 0.85rem;
            color: var(--soil-brown);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-draft {
            background: #e0e0e0;
            color: #616161;
        }

        .badge-listed {
            background: #e3f2fd;
            color: #1565c0;
        }

        .badge-negotiation {
            background: #fff8e1;
            color: #f57f17;
        }

        .badge-locked {
            background: #ffe0b2;
            color: #e65100;
        }

        .badge-delivered {
            background: #f3e5f5;
            color: #6a1b9a;
        }

        .badge-settled {
            background: #e8f5e9;
            color: var(--primary-green);
        }

        .details p {
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .price {
            font-weight: 600;
            color: var(--primary-green);
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .btn-edit {
            background: #f5f5f5;
            color: var(--charcoal);
            border: 1px solid #ddd;
        }

        .btn-delete {
            background: #ffebee;
            color: var(--danger-red);
            border: 1px solid #ffcdd2;
        }

        .btn-bids {
            background: var(--harvest-yellow);
            color: var(--charcoal);
        }
    </style>
</head>

<body>
    <header class="header">
        <a href="farmer_dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <h2>My Listings</h2>
    </header>


    <div class="container" id="listings-container">
    </div>
    <script src="../shared/toast.js"></script>
    <script src="my_listings.js"></script>
</body>

</html>
