<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanSetu | My Bids & Offers</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="buyer_dashboard_style.css">
    <link rel="stylesheet" href="../farmer/form_style.css">
    <link rel="stylesheet" href="../farmer/bid_inbox_style.css">
    <link rel="stylesheet" href="../shared/common.css">

</head>
<body>

    <div class="app-container">

        <header class="form-header">
            <a href="buyer_dashboard.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h2>
                My Bids & Offers
                <span class="header-badge" id="bid-count" style="display:none">0</span>
            </h2>
            <div style="width:24px"></div>
        </header>

        <div class="inbox-body">

            <p class="inbox-subtitle">
                Track your offers on farmer listings. Accept or decline counter-offers here.
            </p>

            <div id="bids-container">
            </div>

            <p class="empty-inbox" id="empty-msg" style="display:none">
                <i class="fa-solid fa-inbox"></i><br>
                You haven't placed any bids yet.<br>
                <small>Go to Browse Produce to make an offer.</small>
            </p>

        </div>

    </div>

    <script type="module" src="bids_offers.js"></script>
</body>
</html>
