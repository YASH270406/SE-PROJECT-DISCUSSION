<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanSetu - Track Orders</title>
    <link rel="stylesheet" href="trackorder.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/common.css">
</head>

<body>
    <div class="app-container">
        <div class="dashboard-header">
            <a href="buyer_dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <div class="user-info">
                <span class="greeting">🚚 Track My Deliveries</span>
            </div>
        </div>


        <div class="content-wrapper">
            
            <div class="tab-container">
                <button class="tab-btn active" onclick="switchTab('active')" id="tabActive">Active Deliveries</button>
                <button class="tab-btn" onclick="switchTab('past')" id="tabPast">Past Orders</button>
            </div>

            <div id="activeOrdersList" class="order-list">
                </div>

            <div id="pastOrdersList" class="order-list" style="display: none;">
                </div>

        </div>
    </div>

    <div id="issueModalOverlay" class="modal-overlay">
        <div class="card modal-content">
            <h3 style="color: var(--danger-red); margin-bottom: 10px;">Raise an Issue</h3>
            <p style="font-size: 0.9rem; color: var(--charcoal); margin-bottom: 15px;">Having trouble with Order <span id="issueOrderId" style="font-weight: bold;"></span>?</p>
            <textarea rows="4" placeholder="Describe the problem (e.g., Truck delayed, wrong crop quality...)" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 15px;"></textarea>
            <div style="display: flex; gap: 10px;">
                <button class="btn-primary" style="background-color: var(--danger-red);" onclick="closeIssueModal()">Submit to Support</button>
                <button class="btn-primary btn-secondary" onclick="closeIssueModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="trackorder.js"></script>
</body>
</html>
