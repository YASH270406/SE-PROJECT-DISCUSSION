<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanSetu - Live Mandi Prices</title>
    <link rel="stylesheet" href="mandiandtrackorder.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="dashboard-header">
            <div class="user-info">
                <span class="greeting">📈 Market Prices</span>
            </div>
            <div class="sync-status">
                <div class="pulse-dot"></div> Live
            </div>
        </div>

        <div class="content-wrapper">
            <div id="priceAlert" class="sys-alert" style="background-color: rgba(251, 192, 45, 0.15); color: #f57f17; border-color: #fbc02d;">
                <strong>Opportunity:</strong> Current price is >10% below the 30-day average!
            </div>

            <div class="card">
                <div class="form-group">
                    <label>Select Commodity</label>
                    <select id="cropSelect">
                        <option value="Wheat">Wheat (Grade A)</option>
                        <option value="Tomato">Tomato (Hybrid)</option>
                        <option value="Onion">Onion (Red)</option>
                    </select>
                </div>
                
                <div class="metric-grid">
                    <div class="metric-card">
                        <span>Current Price / Qtl</span>
                        <h4 id="currentPrice">₹2,150</h4>
                        <div id="trendIndicator" class="trend-down">↓ 12% vs Avg</div>
                    </div>
                    <div class="metric-card">
                        <span>30-Day Average</span>
                        <h4 id="avgPrice">₹2,443</h4>
                        <div class="trend-up" style="color: var(--soil-brown)">Stable</div>
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="mandiChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    <script src="live_mandi.js"></script>
</body>
</html>
