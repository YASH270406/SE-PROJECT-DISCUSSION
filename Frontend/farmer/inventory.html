<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanSetu - Inventory Dashboard</title>
    <link rel="stylesheet" href="inventoryandsoilhealth.css">
</head>
<body>
    <div class="app-container">
        <div class="dashboard-header">
            <div class="user-info">
                <span class="greeting">📦 Inventory</span>
            </div>
            <div class="sync-status" id="syncIndicator">
                <div class="pulse-dot"></div> Online
            </div>
        </div>

        <div class="content-wrapper">
            <div id="expiryAlerts" class="sys-alert"></div>

            <div class="card">
                <h3>Add New Batch</h3>
                <form id="batchForm">
                    <div class="form-group">
                        <label>Crop Type</label>
                        <select id="cropType" required>
                            <option value="Tomato">Tomato</option>
                            <option value="Potato">Potato</option>
                            <option value="Wheat">Wheat</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Quantity (Quintals)</label>
                        <input type="number" id="qty" min="1" required>
                    </div>
                    <div class="form-group">
                        <label>Storage Location</label>
                        <input type="text" id="storageLoc" placeholder="e.g., Warehouse A" required>
                    </div>
                    <div class="form-group">
                        <label>Harvest Date</label>
                        <input type="date" id="harvestDate" required>
                    </div>
                    <button type="submit" class="btn-primary">Log Batch</button>
                </form>
            </div>

            <div class="card">
                <h3>Current Stock</h3>
                <button id="downloadPdfBtn" class="btn-primary btn-secondary">Download Summary (PDF)</button>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Crop</th>
                                <th>Qty</th>
                                <th>Location</th>
                                <th>Expiry</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="inventory.js"></script>
</body>
</html>
