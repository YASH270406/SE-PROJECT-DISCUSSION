<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanSetu | Bid Inbox</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/common.css">
    <link rel="stylesheet" href="bid_inbox_style.css">
    <link rel="stylesheet" href="../buyer/bids_offers_style.css">


    <style>
        :root {
            --primary-green: #2e7d32;
            --soil-brown: #8d6e63;
            --harvest-yellow: #fbc02d;
            --charcoal: #37474f;
            --white: #ffffff;
            --light-bg: #f4f7f6;
            --danger-red: #d32f2f;
            --pending-orange: #f57c00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--light-bg);
            color: var(--charcoal);
        }

        .hero-header {
            background: linear-gradient(rgba(46, 125, 50, 0.85), rgba(46, 125, 50, 0.9)),
                url('https://images.unsplash.com/photo-1599839619722-39751411ea63?auto=format&fit=crop&w=1200&q=80') center/cover;
            color: var(--white);
            padding: 40px 20px 80px 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .back-btn:hover {
            transform: translateX(-4px);
        }

        .hero-header h1 {
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-badge {
            background: var(--harvest-yellow);
            color: var(--charcoal);
            font-size: 1.1rem;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .hero-header p {
            font-size: 1rem;
            color: #e8f5e9;
            font-weight: 300;
            max-width: 900px;
            margin: 0 auto;
            text-align: left;
            padding-left: 36px;
        }

        .inbox-container {
            max-width: 900px;
            margin: -50px auto 40px auto;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .bid-card {
            background: var(--white);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .bid-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
        }

        .bid-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 6px;
            height: 100%;
            background: var(--pending-orange);
        }

        .bid-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .buyer-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .buyer-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #e8f5e9;
            color: var(--primary-green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .buyer-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--charcoal);
        }

        .bid-time {
            font-size: 0.8rem;
            color: #888;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 2px;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-pending {
            background: #fff3e0;
            color: var(--pending-orange);
            border: 1px solid #ffe0b2;
        }

        .bid-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .detail-card {
            background: #fbfbfb;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #f0f0f0;
        }

        .detail-label {
            display: block;
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--charcoal);
        }

        .detail-card.highlight {
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
        }

        .detail-card.highlight .detail-value {
            color: var(--primary-green);
            font-size: 1.2rem;
        }

        .detail-card.total {
            background: #fffde7;
            border: 1px solid #fff59d;
        }

        .bid-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .bid-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-accept {
            background: var(--primary-green);
            color: var(--white);
        }

        .btn-accept:hover {
            background: #1b5e20;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(46, 125, 50, 0.3);
        }

        .btn-reject {
            background: #ffebee;
            color: var(--danger-red);
        }

        .btn-reject:hover {
            background: #ffcdd2;
            transform: translateY(-2px);
        }

        .btn-counter {
            background: #e3f2fd;
            color: #1565c0;
            border: 1px solid #bbdefb;
        }

        .btn-counter:hover {
            background: #bbdefb;
            transform: translateY(-2px);
        }

        .counter-form {
            background: #f8fcfd;
            padding: 20px;
            border-radius: 10px;
            border: 1px dashed #90caf9;
            margin-top: 15px;
            animation: fadeIn 0.3s ease;
        }

        .counter-form label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #1565c0;
            display: block;
            margin-bottom: 10px;
        }

        .counter-input-row {
            display: flex;
            gap: 10px;
        }

        .counter-input-row span {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--white);
            border: 2px solid #ddd;
            border-right: none;
            padding: 0 15px;
            border-radius: 8px 0 0 8px;
            font-weight: 600;
        }

        .counter-input-row input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-left: none;
            border-radius: 0 8px 8px 0;
            outline: none;
            font-size: 1rem;
        }

        .counter-input-row input:focus {
            border-color: #42a5f5;
        }

        .counter-input-row button {
            background: #1565c0;
            color: var(--white);
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .counter-input-row button:hover {
            background: #0d47a1;
        }

        .empty-inbox {
            text-align: center;
            padding: 60px 20px;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .empty-inbox i {
            font-size: 4rem;
            color: #cfd8dc;
            margin-bottom: 15px;
        }

        .empty-inbox h3 {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--charcoal);
        }

        .empty-inbox small {
            color: #888;
            font-size: 0.95rem;
            display: block;
            margin-top: 10px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .hero-header h1 {
                font-size: 1.6rem;
            }

            .hero-header p {
                padding-left: 30px;
            }

            .bid-details {
                grid-template-columns: 1fr 1fr;
            }

            .bid-actions {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <header class="hero-header">
        <div class="header-top">
            <a href="farmer_dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <h1>Bid Inbox <span class="header-badge" id="bid-count">0</span></h1>
        </div>

        <p>Manage incoming offers from verified buyers. Accept directly or send a counter-offer to negotiate better
            rates.</p>
    </header>

    <nav class="tab-navigation">
        <div class="tab-bar">
            <button class="tab-btn active" id="tab-active" onclick="window.setViewMode('active')">
                <i class="fa-solid fa-bolt"></i> Active Bids
            </button>
            <button class="tab-btn" id="tab-history" onclick="window.setViewMode('history')">
                <i class="fa-solid fa-clock-rotate-left"></i> History
            </button>
        </div>
    </nav>

    <div class="inbox-container">

        <!-- JS will replace this container with real cards -->
        <div id="bids-container">



        </div>

        <div class="empty-inbox" id="empty-msg" style="display:none">
            <i class="fa-solid fa-inbox"></i>
            <h3>No pending bids right now</h3>
            <small>New offers from buyers on your listings will appear here automatically.</small>
        </div>

    </div>

    <!-- We keep the JS logic reference exactly as it was -->
    <script type="module" src="bid_inbox.js"></script>

</body>

</html>
