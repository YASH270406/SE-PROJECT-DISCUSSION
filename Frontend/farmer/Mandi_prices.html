<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanSetu | Mandi Prices</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="farmer_dashboard_style.css">
    <link rel="stylesheet" href="form_style.css">
    <link rel="stylesheet" href="mandi_prices_style.css">
</head>
<body>

    <div class="app-container">

        <header class="form-header">
            <a href="farmer_dashboard.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h2>Mandi Prices</h2>
            <div style="width:24px"></div>
        </header>

        <div class="mandi-body">

            <div class="filter-bar">
                <div class="filter-group">
                    <label for="filter-state">State</label>
                    <select id="filter-state" onchange="onStateChange()">
                        <option value="">All States</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filter-district">District</label>
                    <select id="filter-district" onchange="filterData()">
                        <option value="">All Districts</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filter-crop">Crop</label>
                    <select id="filter-crop" onchange="filterData()">
                        <option value="">All Crops</option>
                    </select>
                </div>
            </div>

            <p class="last-updated" id="last-updated">
                <i class="fa-solid fa-clock"></i> Fetching latest prices...
            </p>

            <div class="table-wrapper">
                <table class="mandi-table" id="mandi-table">
                    <thead>
                        <tr>
                            <th>Mandi Name</th>
                            <th>Crop</th>
                            <th>Min ₹</th>
                            <th>Max ₹</th>
                            <th>Modal ₹</th>
                            <th>Distance</th>
                        </tr>
                    </thead>
                    <tbody id="mandi-tbody">
                        <tr>
                            <td colspan="6" class="loading-row">
                                <i class="fa-solid fa-spinner fa-spin"></i> Loading prices...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="trend-hint" id="trend-hint" style="display:none">
                <i class="fa-solid fa-chart-line"></i>
                Tap any row to see the 30-day price trend for that crop.
            </div>

        </div>

    </div>

    <script src="mandi_prices.js"></script>
</body>
</html>
