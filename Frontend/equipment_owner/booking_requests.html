<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanSetu | Request Inbox</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/common.css">
    <link rel="stylesheet" href="booking_requests_style.css">
</head>
<body>
    <header class="hero-header">
        <div class="header-top">
            <a href="equipment_dashboard.html" style="color:white; font-size:1.5rem;"><i class="fa-solid fa-arrow-left"></i></a>
            <h1>Request Inbox <span class="header-badge" id="req-count">0</span></h1>
        </div>
        <p>Review rental requests, check scheduled durations, and approve or decline based on your fleet's availability.</p>
    </header>

    <nav class="tab-navigation">
        <div class="tab-bar">
            <button class="tab-btn active" id="tab-new" onclick="window.switchTab('Pending')">
                <i class="fa-solid fa-bolt"></i> New Requests
            </button>
            <button class="tab-btn" id="tab-history" onclick="window.switchTab('History')">
                <i class="fa-solid fa-clock-rotate-left"></i> History
            </button>
        </div>
    </nav>

    <div class="inbox-container">
        <!-- JS will render request-cards here -->
        <div id="request-grid"></div>

        <div class="empty-inbox" id="empty-state" style="display:none">
            <i class="fa-solid fa-inbox"></i>
            <h3>No requests found</h3>
            <p>New rental requests from farmers will appear here automatically.</p>
        </div>
    </div>

    <script type="module" src="booking_requests.js"></script>

</body>
</html>
