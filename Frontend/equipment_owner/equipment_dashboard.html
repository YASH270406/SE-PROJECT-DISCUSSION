<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanSetu | Equipment Owner Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="equipment_dashboard_style.css">
    <link rel="stylesheet" href="../shared/common.css">
</head>
<body>

    <div class="app-container">
        
        <header class="dashboard-header">
            <div class="user-info">
                <img src="../images/buyer_profile.jpg" alt="Profile" class="profile-pic" onerror="this.src='https://placehold.co/50?text=Owner'">
                <div>
                    <h2 class="greeting">Hello!</h2>
                    <p class="location"><i class="fa-solid fa-location-dot"></i> Rohtak, Haryana</p>
                </div>
            </div>
            <!-- Auth Helper will inject Logout Button here -->
        </header>


        <div class="earnings-widget" onclick="location.href='earnings_report.html'" style="cursor: pointer;">
            <div class="earnings-info">
                <h3>₹ <span id="dash-total-earnings">0</span> <i class="fa-solid fa-wallet" style="font-size: 1.2rem; margin-left: 10px;"></i></h3>
                <p><span id="dash-monthly-earnings">₹0</span> this month • <span id="dash-active-rentals">0</span> Assets Rented</p>
            </div>
        </div>

        <div class="action-grid">
            <a href="manage_fleet.html" style="text-decoration: none; display: contents;">
                <div class="action-card">
                    <img src="../images/manage_fleet.jpg" alt="My Fleet" class="action-img" onerror="this.src='https://placehold.co/80?text=Fleet'">
                    <p>Manage Fleet</p>
                </div>
            </a>
            <a href="booking_requests.html" style="text-decoration: none; display: contents;">
                <div class="action-card">
                    <img src="../images/booking_request.jpg" alt="Booking Requests" class="action-img" onerror="this.src='https://placehold.co/80?text=Requests'">
                    <p>Booking Requests</p>
                </div>
            </a>
            <a href="rental_calendar.html" style="text-decoration: none; display: contents;">
                <div class="action-card">
                    <img src="../images/rental_cal.jpg" alt="Rental Calendar" class="action-img" onerror="this.src='https://placehold.co/80?text=Calendar'">
                    <p>Rental Calendar</p>
                </div>
            </a>
            <a href="earnings_report.html" style="text-decoration: none; display: contents;">
                <div class="action-card">
                    <img src="../images/earning_report.jpg" alt="Reports" class="action-img" onerror="this.src='https://placehold.co/80?text=Reports'">
                    <p>Earnings Report</p>
                </div>
            </a>
        </div>

        <div class="recent-alerts">
            <h3 class="section-title">Action Required</h3>
            <div id="alerts-container">
                <p class="empty-notif" style="text-align: center; padding: 20px; color: #999; font-size: 0.9rem;">
                    Checking for updates...
                </p>
            </div>
        </div>

        <button class="voice-fab" id="add-equip-btn" onclick="addNewEquipment()">
            <i class="fa-solid fa-plus" style="font-size: 28px; color: #37474f;"></i>
        </button>

    </div>

    <script type="module" src="equipment_dashboard.js"></script>
</body>
</html>
