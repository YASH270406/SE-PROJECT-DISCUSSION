<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanSetu - Soil Health & Advisory</title>
    <link rel="stylesheet" href="inventoryandsoilhealth.css">
</head>
<body>
    <div class="app-container">
        <div class="dashboard-header">
            <div class="user-info">
                <span class="greeting">🌱 Soil Health</span>
            </div>
            <div class="sync-status" id="syncIndicator">
                <div class="pulse-dot"></div> Online
            </div>
        </div>

        <div class="offline-banner" id="apiFallback" style="display: none;">
            <div>
                <h4>⚠️ Working Offline</h4>
                <p>Unable to reach govt servers. Showing cached data.</p>
            </div>
        </div>

        <div class="content-wrapper">
            <div class="card">
                <h3>Fetch Soil Health Card</h3>
                <div class="form-group">
                    <input type="text" id="shcId" placeholder="Enter 12-digit SHC ID" required>
                </div>
                <button id="fetchDataBtn" class="btn-primary">Get Recommendations</button>
                
                <div id="resultsContainer" style="display: none;">
                    <div class="npk-grid">
                        <div class="npk-box">Nitrogen<span id="valN">-</span></div>
                        <div class="npk-box">Phosphorus<span id="valP">-</span></div>
                        <div class="npk-box">Potassium<span id="valK">-</span></div>
                    </div>
                    
                    <div class="recommendation-box">
                        <strong>Expert Advice:</strong>
                        <p id="recommendationText" style="margin-top: 5px;"></p>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>Local Schemes</h3>
                <div class="form-group">
                    <select id="stateFilter">
                        <option value="UP">Uttar Pradesh</option>
                        <option value="MP">Madhya Pradesh</option>
                        <option value="MH">Maharashtra</option>
                    </select>
                </div>
                <div id="newsFeed" style="margin-top: 15px;">
                    </div>
            </div>
        </div>
    </div>
    <script src="soil_health.js"></script>
</body>
</html>
