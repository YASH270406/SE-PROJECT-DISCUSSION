<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanSetu | Sell Produce</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css"> <link rel="stylesheet" href="form_style.css"> </head>
<body>

    <div class="app-container">
        
        <header class="form-header">
            <a href="farmer_dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <h2>Create Listing</h2>
            <div style="width: 24px;"></div> </header>

        <form id="produce-form" class="listing-form">
            
            <div class="form-group">
                <label for="cropName">Crop Name *</label>
                <select id="cropName" required>
                    <option value="" disabled selected>Select a crop...</option>
                    <option value="Wheat">Wheat</option>
                    <option value="Rice/Paddy">Rice / Paddy</option>
                    <option value="Tomato">Tomato</option>
                    <option value="Onion">Onion</option>
                    <option value="Potato">Potato</option>
                </select>
            </div>

            <div class="form-group">
                <label for="variety">Variety</label>
                <input type="text" id="variety" placeholder="e.g., Sharbati, Basmati" required>
            </div>

            <div class="form-row">
                <div class="form-group half">
                    <label for="quantity">Quantity *</label>
                    <input type="number" id="quantity" placeholder="e.g., 50" required>
                </div>
                <div class="form-group half">
                    <label for="unit">Unit *</label>
                    <select id="unit" required>
                        <option value="Quintal">Quintal</option>
                        <option value="Kg">Kg</option>
                        <option value="Ton">Ton</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="price">Expected Base Price (per unit) *</label>
                <div class="input-with-icon">
                    <span class="currency-symbol">₹</span>
                    <input type="number" id="price" placeholder="e.g., 2500" required>
                </div>
                <small class="helper-text">Mandi Average today: ₹2450/Quintal</small>
            </div>

            <div class="form-group">
                <label for="harvestDate">Expected Harvest Date *</label>
                <input type="date" id="harvestDate" required>
            </div>

            <div class="form-group">
                <label for="cropImage">Upload Photos (Max 3)</label>
                <div class="file-upload-box" onclick="document.getElementById('cropImage').click()">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p>Tap to upload images</p>
                </div>
                <input type="file" id="cropImage" accept="image/*" multiple style="display: none;">
            </div>

            <button type="submit" class="accent-btn full-width submit-btn">Publish Listing</button>
        </form>

    </div>

    <script src="sell_produce.js"></script>
</body>
</html>
