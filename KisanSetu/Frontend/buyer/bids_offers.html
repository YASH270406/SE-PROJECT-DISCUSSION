<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanSetu | My Bids & Offers</title>
    <meta name="description" content="Track and manage your offers on farmer listings. Accept, decline or counter-offer to negotiate the best deal.">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="buyer_dashboard_style.css">
    <link rel="stylesheet" href="../farmer/bid_inbox_style.css">
    <link rel="stylesheet" href="../shared/common.css">
    <link rel="stylesheet" href="bids_offers_style.css">
</head>
<body>

    <div class="app-container">

        <header class="form-header" style="display: flex; align-items: center; justify-content: space-between; padding: 15px 20px;">
            
            <div style="display: flex; align-items: center; gap: 15px;">
                <a href="buyer_dashboard.html" class="back-btn" id="back-to-dashboard" style="text-decoration: none; color: inherit;">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <h2 id="page-title" style="margin: 0; display: flex; align-items: center; gap: 10px;">
                    Bids &amp; Offers
                    <span class="header-badge" id="bid-count" style="display:none">0</span>
                </h2>
            </div>

            <button id="global-mic-icon" onclick="toggleGlobalVoice()" title="Tap to speak" style="background: #ffffff !important; color: #2e7d32 !important; border: 2px solid #ffffff !important; width: 42px !important; height: 42px !important; border-radius: 50% !important; display: flex !important; align-items: center !important; justify-content: center !important; cursor: pointer !important; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2) !important; transition: transform 0.2s !important; flex-shrink: 0 !important; margin: 0 !important; padding: 0 !important;">
                <i class="fa-solid fa-microphone" style="font-size: 1.2rem !important; color: #2e7d32 !important; margin: 0 !important; padding: 0 !important;"></i>
            </button>

        </header>

        <nav class="tab-navigation" style="margin-top:0; padding: 16px 20px 0;">
            <div class="tab-bar">
                <button class="tab-btn active" id="tab-active" onclick="window.setViewMode('active')">
                    <i class="fa-solid fa-bolt"></i> Active
                </button>
                <button class="tab-btn" id="tab-history" onclick="window.setViewMode('history')">
                    <i class="fa-solid fa-clock-rotate-left"></i> History
                </button>
            </div>
        </nav>

        <div class="inbox-body">

            <p class="inbox-subtitle" style="margin: 20px 20px 10px; font-size: 0.9rem; color: #666;">
                Track all your negotiations here. The badge shows offers where the farmer has countered and you need to respond.
            </p>

            <div id="bids-container"></div>

            <div class="empty-inbox" id="empty-msg" style="display:none">
                <i class="fa-solid fa-inbox"></i>
                <h3>No bids here</h3>
                <small>Go to Browse Produce to place an offer on a listing.</small>
            </div>

        </div>

    </div>

    <script type="module" src="bids_offers.js"></script>
   <script src="voice.js"></script>
</body>
</html>
